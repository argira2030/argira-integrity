<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argira Integrity Shield · Versión Final Estable</title>
    <style>
        :root {
            --bg-deep: #02020a; --surface: #0b0b14; --card-bg: #11111f; --accent: #00f7b0;
            --danger: #ff3e6c; --warning: #ff9f2e; --text-main: #eaeaef; --text-dim: #b0b0cc;
            --border-dim: #2a2a40;
        }
        body { 
            background: var(--bg-deep); color: var(--text-main); 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; 
        }
        .container { 
            background: var(--surface); padding: 30px; border-radius: 16px; 
            border: 1px solid var(--border-dim); width: 100%; max-width: 700px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
        }
        h2 { color: var(--accent); margin: 0 0 20px 0; font-weight: 300; letter-spacing: -0.5px; }
        
        textarea { 
            width: 100%; background: var(--card-bg); border: 1px solid var(--border-dim); 
            color: var(--text-main); padding: 18px; border-radius: 10px; resize: vertical; 
            margin-bottom: 15px; font-size: 1rem; line-height: 1.5; box-sizing: border-box; 
            transition: border 0.3s; 
        }
        textarea:focus { outline: none; border-color: var(--accent); }
        
        .btn-group { display: flex; gap: 12px; margin-bottom: 25px; }
        button { 
            flex: 2; background: var(--accent); color: #000; border: none; 
            padding: 14px; border-radius: 8px; cursor: pointer; font-weight: 700; 
            text-transform: uppercase; transition: 0.3s; 
        }
        button.btn-sec { flex: 1; background: transparent; border: 1px solid var(--border-dim); color: var(--text-dim); }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .results { 
            margin-top: 30px; padding-top: 25px; border-top: 1px solid var(--border-dim); 
            display: none; animation: fadeIn 0.4s ease-out; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .metrics { display: flex; gap: 15px; margin-bottom: 20px; }
        .metric-box { 
            flex: 1; background: var(--card-bg); padding: 20px; border-radius: 12px; 
            text-align: center; border: 1px solid var(--border-dim); 
        }
        .metric-val { display: block; font-size: 2.2rem; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
        .metric-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        
        /* Modales */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center; 
            z-index: 1000; backdrop-filter: blur(8px); padding: 20px; box-sizing: border-box; 
        }
        .modal-content { 
            background: var(--surface); padding: 30px; border-radius: 16px; 
            border: 1px solid var(--border-dim); max-width: 550px; width: 100%; 
        }
        
        .status-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .dot { height: 12px; width: 12px; border-radius: 50%; background: #333; transition: background 0.3s; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Argira Integrity Shield</h2>
        
        <textarea id="inputText" rows="7" placeholder="Pega aquí el contenido para analizar sesgos y manipulación semántica..."></textarea>
        
        <div class="btn-group">
            <button id="auditBtn">EJECUTAR AUDITORÍA</button>
            <button id="compareBtn" class="btn-sec">COMPARAR</button>
        </div>

        <div id="resultsArea" class="results">
            <div class="status-header">
                <div id="semDot" class="dot"></div>
                <span id="semLabel" style="font-weight: 600; font-size: 0.95rem;">Iniciando motor...</span>
            </div>
            
            <div class="metrics">
                <div class="metric-box">
                    <span id="imIndex" class="metric-val">0</span>
                    <span class="metric-label">IM (Manipulación)</span>
                </div>
                <div class="metric-box">
                    <span id="deltaIC" class="metric-val">0</span>
                    <span class="metric-label">Δ IC (Inercia)</span>
                </div>
            </div>
        </div>
    </div>

    <div id="compareModal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--accent); margin-top:0;">Análisis Comparativo</h3>
            <p style="color:var(--text-dim); font-size:0.85rem; margin-bottom:15px;">Pega el texto de contraste para medir la variación del sesgo.</p>
            <textarea id="secondText" rows="6" placeholder="Segundo texto aquí..."></textarea>
            <div class="btn-group">
                <button id="doCompareBtn">CONTRASTAR</button>
                <button onclick="document.getElementById('compareModal').style.display='none'" class="btn-sec">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://argira-api-v1.onrender.com';

        async function runAudit(sourceId) {
            const btn = document.getElementById('auditBtn');
            const text = document.getElementById(sourceId).value;
            const semLabel = document.getElementById('semLabel');
            const resultsArea = document.getElementById('resultsArea');
            const dot = document.getElementById('semDot');

            if (!text || !text.trim()) return;

            btn.disabled = true;
            btn.innerText = "SINCRONIZANDO...";
            
            const call = async (retries = 0) => {
                try {
                    const res = await fetch(`${API_URL}/analyze`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: text }),
                        signal: AbortSignal.timeout(45000)
                    });

                    if (!res.ok) throw new Error('Retry');
                    const data = await res.json();
                    
                    resultsArea.style.display = 'block';
                    document.getElementById('imIndex').innerText = data.im;
                    document.getElementById('deltaIC').innerText = data.delta;

                    // Semáforo de Riesgo
                    if(data.im < 3) { 
                        dot.style.background = 'var(--accent)'; 
                        semLabel.innerText = "Texto Seguro / Neutral";
                        semLabel.style.color = 'var(--accent)';
                    } else if(data.im < 6) { 
                        dot.style.background = 'var(--warning)'; 
                        semLabel.innerText = "Sesgos Detectados";
                        semLabel.style.color = 'var(--warning)';
                    } else { 
                        dot.style.background = 'var(--danger)'; 
                        semLabel.innerText = "Alerta: Alta Manipulación";
                        semLabel.style.color = 'var(--danger)';
                    }
                } catch (e) {
                    if (retries < 4) {
                        semLabel.innerText = `Reconectando (${retries + 1})...`;
                        await new Promise(r => setTimeout(r, 4000));
                        return call(retries + 1);
                    }
                    semLabel.innerText = "Error: El servidor no responde.";
                }
            };

            await call();
            btn.disabled = false;
            btn.innerText = "EJECUTAR AUDITORÍA";
        }

        // Control de Eventos
        document.getElementById('auditBtn').onclick = () => runAudit('inputText');
        document.getElementById('compareBtn').onclick = () => document.getElementById('compareModal').style.display = 'flex';
        
        document.getElementById('doCompareBtn').onclick = () => {
            document.getElementById('compareModal').style.display = 'none';
            runAudit('secondText');
        };

        // Cerrar modal al clickar fuera
        window.onclick = (e) => {
            if(e.target.className === 'modal') e.target.style.display = 'none';
        };

        // Despertar servidor
        fetch(`${API_URL}/ping`).catch(() => {});
    </script>
</body>
</html>
